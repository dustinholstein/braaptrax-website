<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Trails — BraapTrax Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="bt-wrap" id="content" hidden>
  <div class="bt-header" style="display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap">
    <div>
      <div class="bt-eyebrow">Admin</div>
      <h1 class="bt-title">Verified Trails</h1>
      <p class="bt-sub">Manage every published verified trail. Sorted by region, then name.</p>
    </div>
    <div class="bt-row-actions">
      <button class="bt-btn bt-btn-ghost bt-btn-sm" id="rebuild-btn" type="button">Rebuild search index</button>
      <a class="bt-btn bt-btn-primary" href="/admin/manual.html">+ New Manual Trail</a>
    </div>
  </div>

  <div class="bt-callout" id="index-banner" hidden style="margin-bottom:1.25rem"></div>

  <div class="bt-filters">
    <input id="f-q" class="bt-input" type="search" placeholder="Search name or region (use * wildcard)">
    <select id="f-diff" class="bt-select">
      <option value="">Any difficulty</option>
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
      <option value="expert">Expert</option>
    </select>
    <input id="f-emin" class="bt-input" type="number" min="0" step="100" placeholder="Min ft">
    <input id="f-emax" class="bt-input" type="number" min="0" step="100" placeholder="Max ft">
    <button id="f-clear" class="bt-btn bt-btn-ghost bt-btn-sm" type="button">Clear</button>
    <span class="bt-hint" id="f-count"></span>
  </div>

  <div id="trails"></div>
  <div class="bt-center" id="more-wrap" hidden>
    <button class="bt-btn bt-btn-ghost" id="more-btn">Load more</button>
  </div>
</div>

<div class="bt-wrap" id="boot">
  <div class="bt-loading"><span class="bt-spinner"></span></div>
</div>

<script type="module">
  import {
    guardPage,
    db, storage,
    collection, query, orderBy, limit, startAfter, getDocs,
    doc, updateDoc, deleteDoc, setDoc, writeBatch,
    storageRef, listAll, deleteObject,
    rideTypeIcon, escapeHtml, showToast,
    metersToMiles, metersToFeet,
    buildTrailIndex, TRAIL_INDEX_COLLECTION,
  } from "/admin/admin.js";

  const PAGE_SIZE = 50;
  // Read the lightweight index by default; fall back to scanning
  // verifiedTrails if the index isn't built/permitted yet.
  let SRC = TRAIL_INDEX_COLLECTION;
  await guardPage("trails");

  document.getElementById("boot").remove();
  const content = document.getElementById("content");
  content.hidden = false;

  const trailsEl = document.getElementById("trails");
  const moreWrap = document.getElementById("more-wrap");
  const moreBtn = document.getElementById("more-btn");

  let lastDoc = null;
  let exhausted = false;
  const loaded = new Map(); // id -> data

  const SOURCE_LABEL = {
    user_ride: "From Ride",
    manual: "Manual",
    imported: "Imported",
  };

  function trailFeet(t) {
    return Math.round(metersToFeet(Number(t.elevationGainMeters) || 0));
  }

  function trailRow(id, t) {
    const diff = (t.difficulty || "").toLowerCase();
    const active = t.isActive !== false;
    const srcLabel = SOURCE_LABEL[t.source] || (t.source ? escapeHtml(t.source) : "Manual");
    const mi = metersToMiles(Number(t.distanceMeters) || 0).toFixed(1);
    const ft = trailFeet(t);
    return `
      <div class="bt-row" data-id="${id}">
        <div class="bt-row-icon">${rideTypeIcon(t.rideType)}</div>
        <div class="bt-row-main">
          <div class="bt-row-title">${escapeHtml(t.name || "(untitled)")}</div>
          <div class="bt-row-meta">
            <span>${escapeHtml(t.region || "—")}</span>
            ${diff ? `<span class="bt-badge bt-badge--${diff}">${escapeHtml(diff)}</span>` : ""}
            <span>${mi} mi</span>
            <span>${ft.toLocaleString()} ft</span>
            <span class="bt-badge bt-badge--source">${srcLabel}</span>
            <span class="bt-badge bt-badge--${active ? "active" : "inactive"}">${active ? "Active" : "Inactive"}</span>
          </div>
        </div>
        <div class="bt-row-actions">
          <a class="bt-btn bt-btn-ghost bt-btn-sm" href="/admin/publish.html?trailId=${encodeURIComponent(id)}">Edit</a>
          <button class="bt-btn bt-btn-ghost bt-btn-sm" data-act="toggle" data-id="${id}">${active ? "Deactivate" : "Reactivate"}</button>
          <button class="bt-btn bt-btn-danger bt-btn-sm" data-act="delete" data-id="${id}">Delete</button>
        </div>
      </div>`;
  }

  // ---- Filters ----
  const fQ = document.getElementById("f-q");
  const fDiff = document.getElementById("f-diff");
  const fEmin = document.getElementById("f-emin");
  const fEmax = document.getElementById("f-emax");
  const fCount = document.getElementById("f-count");

  function filtersActive() {
    return !!(
      fQ.value.trim() ||
      fDiff.value ||
      fEmin.value !== "" ||
      fEmax.value !== ""
    );
  }

  function buildMatcher(q) {
    const s = q.trim();
    if (!s) return null;
    // escape regex, treat * as wildcard, substring (case-insensitive)
    const rx = s
      .replace(/[.+?^${}()|[\]\\]/g, "\\$&")
      .replace(/\*/g, ".*");
    try {
      return new RegExp(rx, "i");
    } catch (_) {
      return null;
    }
  }

  function matches(t) {
    const m = buildMatcher(fQ.value);
    if (m && !(m.test(t.name || "") || m.test(t.region || ""))) return false;
    if (fDiff.value && (t.difficulty || "").toLowerCase() !== fDiff.value) {
      return false;
    }
    const ft = trailFeet(t);
    if (fEmin.value !== "" && ft < Number(fEmin.value)) return false;
    if (fEmax.value !== "" && ft > Number(fEmax.value)) return false;
    return true;
  }

  function render() {
    let entries = [...loaded.entries()];
    const total = entries.length;
    const active = filtersActive();
    if (active) entries = entries.filter(([, t]) => matches(t));
    entries.sort((a, b) => {
      const ra = (a[1].region || "").toLowerCase();
      const rb = (b[1].region || "").toLowerCase();
      if (ra !== rb) return ra < rb ? -1 : 1;
      const na = (a[1].name || "").toLowerCase();
      const nb = (b[1].name || "").toLowerCase();
      return na < nb ? -1 : na > nb ? 1 : 0;
    });
    fCount.textContent = active
      ? `${entries.length} of ${total} match`
      : total
      ? `${total} loaded${exhausted ? "" : "+"}`
      : "";
    moreWrap.hidden = active || exhausted;
    if (entries.length === 0) {
      trailsEl.innerHTML = `<div class="bt-empty">${
        total === 0
          ? "No verified trails yet. Publish one from My Rides."
          : "No trails match these filters."
      }</div>`;
      return;
    }
    trailsEl.innerHTML =
      `<div class="bt-list">` +
      entries.map(([id, t]) => trailRow(id, t)).join("") +
      `</div>`;
  }

  async function loadPage() {
    if (exhausted) return 0;
    let q = query(
      collection(db, SRC),
      orderBy("region"),
      limit(PAGE_SIZE)
    );
    if (lastDoc) q = query(q, startAfter(lastDoc));
    const snap = await getDocs(q);
    snap.forEach((d) => loaded.set(d.id, d.data()));
    lastDoc = snap.docs[snap.docs.length - 1] || lastDoc;
    if (snap.size < PAGE_SIZE) exhausted = true;
    return snap.size;
  }

  async function loadAll() {
    while (!exhausted) {
      // eslint-disable-next-line no-await-in-loop
      await loadPage();
    }
  }

  async function load() {
    try {
      await loadPage();
      render();
    } catch (e) {
      console.error(e);
      trailsEl.innerHTML = `<div class="bt-empty">Couldn't load trails. ${escapeHtml(e.message || e)}</div>`;
    }
  }

  // Filtering needs the full set (Firestore has no substring search), so
  // load every page once when a filter is first applied.
  let filterTimer = null;
  async function onFilter() {
    if (filtersActive() && !exhausted) {
      fCount.textContent = "Loading all trails to search…";
      try {
        await loadAll();
      } catch (e) {
        console.error(e);
      }
    }
    render();
  }
  ["input", "change"].forEach((ev) => {
    fQ.addEventListener(ev, () => {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(onFilter, 200);
    });
    fDiff.addEventListener(ev, onFilter);
    fEmin.addEventListener(ev, onFilter);
    fEmax.addEventListener(ev, onFilter);
  });
  document.getElementById("f-clear").addEventListener("click", () => {
    fQ.value = "";
    fDiff.value = "";
    fEmin.value = "";
    fEmax.value = "";
    render();
  });

  async function deleteTrailPhotos(id) {
    try {
      const folder = storageRef(storage, `verified_trails/${id}`);
      const res = await listAll(folder);
      await Promise.all(res.items.map((item) => deleteObject(item)));
    } catch (e) {
      // Folder may not exist (no photos) — non-fatal.
      console.warn("[trails] photo cleanup:", e.message || e);
    }
  }

  trailsEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const id = btn.dataset.id;
    const act = btn.dataset.act;

    if (act === "toggle") {
      const t = loaded.get(id);
      const next = !(t.isActive !== false);
      btn.disabled = true;
      try {
        await updateDoc(doc(db, "verifiedTrails", id), { isActive: next });
        try {
          await updateDoc(doc(db, TRAIL_INDEX_COLLECTION, id), { isActive: next });
        } catch (ie) {
          console.warn("[trails] index isActive sync skipped:", ie.message || ie);
        }
        t.isActive = next;
        render();
        showToast(next ? "Trail reactivated." : "Trail deactivated.");
      } catch (err) {
        console.error(err);
        showToast("Update failed.", "error");
        btn.disabled = false;
      }
    }

    if (act === "delete") {
      const t = loaded.get(id);
      if (!confirm(`Delete "${t.name || id}"? This removes the trail and its photos permanently.`)) {
        return;
      }
      btn.disabled = true;
      try {
        await deleteDoc(doc(db, "verifiedTrails", id));
        try {
          await deleteDoc(doc(db, TRAIL_INDEX_COLLECTION, id));
        } catch (ie) {
          console.warn("[trails] index delete skipped:", ie.message || ie);
        }
        await deleteTrailPhotos(id);
        loaded.delete(id);
        render();
        showToast("Trail deleted.");
      } catch (err) {
        console.error(err);
        showToast("Delete failed.", "error");
        btn.disabled = false;
      }
    }
  });

  moreBtn.addEventListener("click", async () => {
    moreBtn.disabled = true;
    moreBtn.textContent = "Loading…";
    await load();
    moreBtn.disabled = false;
    moreBtn.textContent = "Load more";
  });

  // ---- Index detection / rebuild ----
  const banner = document.getElementById("index-banner");
  const rebuildBtn = document.getElementById("rebuild-btn");

  async function probe(coll) {
    try {
      const s = await getDocs(query(collection(db, coll), limit(1)));
      return s.size; // 0 = empty
    } catch (_) {
      return -1; // unreadable (rules not deployed)
    }
  }

  async function detectSource() {
    const idx = await probe(TRAIL_INDEX_COLLECTION);
    if (idx > 0) {
      SRC = TRAIL_INDEX_COLLECTION;
      banner.hidden = true;
      return;
    }
    SRC = "verifiedTrails"; // safe fallback so the page always works
    const vt = await probe("verifiedTrails");
    if (vt === 0) {
      banner.hidden = true;
      return;
    }
    banner.hidden = false;
    banner.innerHTML =
      (idx === -1
        ? "Fast search index isn't readable yet — deploy the <code>trailIndex</code> Firestore rules. "
        : "Fast search index is empty. ") +
      "Browsing the full collection for now; click <strong>Rebuild search index</strong> after the rules are deployed.";
  }

  async function rebuildIndex() {
    rebuildBtn.disabled = true;
    const old = rebuildBtn.textContent;
    rebuildBtn.textContent = "Rebuilding…";
    try {
      let cursor = null;
      let total = 0;
      let ex = false;
      while (!ex) {
        let q = query(
          collection(db, "verifiedTrails"),
          orderBy("region"),
          limit(200)
        );
        if (cursor) q = query(q, startAfter(cursor));
        const snap = await getDocs(q);
        if (snap.size) {
          const batch = writeBatch(db);
          snap.forEach((d) =>
            batch.set(
              doc(db, TRAIL_INDEX_COLLECTION, d.id),
              buildTrailIndex(d.data())
            )
          );
          await batch.commit();
        }
        cursor = snap.docs[snap.docs.length - 1] || cursor;
        total += snap.size;
        if (snap.size < 200) ex = true;
        rebuildBtn.textContent = `Rebuilding… ${total}`;
      }
      showToast(`Search index rebuilt (${total} trails).`);
      SRC = TRAIL_INDEX_COLLECTION;
      banner.hidden = true;
      loaded.clear();
      lastDoc = null;
      exhausted = false;
      await load();
    } catch (e) {
      console.error(e);
      showToast(
        "Rebuild failed (" +
          (e && e.message ? e.message : e) +
          "). Check the trailIndex rules.",
        "error"
      );
    } finally {
      rebuildBtn.disabled = false;
      rebuildBtn.textContent = old;
    }
  }
  rebuildBtn.addEventListener("click", rebuildIndex);

  await detectSource();
  await load();
</script>

</body>
</html>
