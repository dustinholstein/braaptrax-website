<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — BraapTrax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="bt-gate">
  <div class="bt-gate-card">
    <div class="bt-gate-label">BraapTrax</div>
    <h1 class="bt-gate-title">Admin Panel</h1>
    <p class="bt-gate-text">Sign in with your admin account to manage verified trails.</p>

    <form class="bt-form" id="login-form" autocomplete="on">
      <div class="bt-field">
        <label class="bt-label" for="email">Email</label>
        <input class="bt-input" type="email" id="email" name="email" required autocomplete="username">
      </div>
      <div class="bt-field">
        <label class="bt-label" for="password">Password</label>
        <input class="bt-input" type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="bt-error" id="login-error"></div>
      <button class="bt-btn bt-btn-primary" type="submit" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<script type="module">
  import { initLoginPage, emailLogin, NAV_ITEMS } from "/admin/admin.js";

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("login-error");
  const btn = document.getElementById("login-btn");

  // If already signed in as an admin this redirects away and never resolves.
  await initLoginPage();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Signing in…";
    try {
      await emailLogin(
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );
      location.replace(NAV_ITEMS[0].href);
    } catch (err) {
      console.error(err);
      const code = err && err.code ? err.code : "";
      errorEl.textContent =
        code === "auth/invalid-credential" ||
        code === "auth/wrong-password" ||
        code === "auth/user-not-found"
          ? "Incorrect email or password."
          : "Sign-in failed. " + (err && err.message ? err.message : "");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });
</script>

</body>
</html>
