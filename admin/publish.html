<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Publish Trail — BraapTrax Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="bt-wrap" id="content" hidden>
  <div class="bt-header">
    <div class="bt-eyebrow">Admin</div>
    <h1 class="bt-title" id="page-title">Publish Verified Trail</h1>
    <p class="bt-sub" id="page-sub">Review the ride data, fill in the trail details, and publish.</p>
  </div>

  <form class="bt-form" id="trail-form" novalidate>
    <div class="bt-field">
      <span class="bt-label">Route<span id="route-req" hidden> <span class="req">*</span></span></span>
      <div class="bt-map" id="map"></div>
      <span class="bt-hint" id="map-hint"></span>
      <div id="route-tools" hidden>
        <div class="bt-row-actions" style="margin-top:.6rem">
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-undo">Undo point</button>
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-clear">Clear route</button>
        </div>
        <details style="margin-top:.75rem">
          <summary class="bt-hint" style="cursor:pointer">…or paste an encoded polyline (standard, precision&nbsp;5)</summary>
          <textarea class="bt-textarea" id="route-paste" style="min-height:64px;margin-top:.5rem"></textarea>
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-load" style="margin-top:.5rem">Load polyline</button>
        </details>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="name">Name <span class="req">*</span></label>
        <input class="bt-input" type="text" id="name" maxlength="120" required>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="region">Region <span class="req">*</span></label>
        <input class="bt-input" type="text" id="region" placeholder="Moab, UT" maxlength="120" required>
      </div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="description">Description</label>
      <textarea class="bt-textarea" id="description" maxlength="2000"></textarea>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="difficulty">Difficulty</label>
        <select class="bt-select" id="difficulty">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
          <option value="expert">Expert</option>
        </select>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="rideType">Ride Type</label>
        <select class="bt-select" id="rideType"></select>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="distance">Distance (miles)</label>
        <input class="bt-input" type="text" id="distance" readonly>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="elevation">Elevation Gain (feet)</label>
        <input class="bt-input" type="text" id="elevation" readonly>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="startLat">Start Latitude</label>
        <input class="bt-input" type="text" id="startLat" readonly>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="startLng">Start Longitude</label>
        <input class="bt-input" type="text" id="startLng" readonly>
      </div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="photos">Photos <span class="bt-hint">(max 10 · resized to 1920px · JPEG)</span></label>
      <input type="file" id="photos" accept="image/*" multiple>
      <div class="bt-photos" id="photo-grid"></div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="isActive" style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;text-transform:none;letter-spacing:0;">
        <input type="checkbox" id="isActive" checked style="width:auto;accent-color:var(--orange);">
        <span>Active &mdash; visible in the BraapTrax app</span>
      </label>
      <span class="bt-hint">The app only shows trails where this is on. New trails default to active.</span>
    </div>

    <div class="bt-error" id="form-error"></div>
    <div class="bt-form-actions">
      <button class="bt-btn bt-btn-primary" type="submit" id="submit-btn">Publish Trail</button>
      <a class="bt-btn bt-btn-ghost" href="/admin/my-rides.html">Cancel</a>
    </div>
  </form>
</div>

<div class="bt-wrap" id="boot">
  <div class="bt-loading"><span class="bt-spinner"></span></div>
</div>

<script type="module">
  import {
    guardPage,
    db,
    doc, collection, getDoc, setDoc, updateDoc, serverTimestamp,
    uploadTrailPhoto, resolvePhotoDisplayURL,
    decodePolyline, encodePolyline, routeDistanceMeters,
    metersToMiles, metersToFeet, feetToMeters,
    compressImage, MAX_PHOTO_BYTES, MAX_PHOTOS,
    RIDE_TYPES, queueToast, escapeHtml,
  } from "/admin/admin.js";

  const { user } = await guardPage("publish");

  const params = new URLSearchParams(location.search);
  const rideId = params.get("rideId");
  const trailId = params.get("trailId");
  const isEdit = !!trailId;
  const isRide = !isEdit && !!rideId;
  // No ride and no trail -> manual (no-ride) entry: admin draws the route.
  const isManual = !isEdit && !isRide;

  // Populate the ride-type dropdown.
  const rideTypeSel = document.getElementById("rideType");
  rideTypeSel.innerHTML = RIDE_TYPES.map(
    (t) => `<option value="${t}">${t}</option>`
  ).join("");

  function ensureRideTypeOption(val) {
    if (!val) return;
    if (![...rideTypeSel.options].some((o) => o.value === val)) {
      rideTypeSel.insertAdjacentHTML(
        "afterbegin",
        `<option value="${escapeHtml(val)}">${escapeHtml(val)}</option>`
      );
    }
    rideTypeSel.value = val;
  }

  // Source data carried through from the ride / existing trail.
  const src = {
    distanceMeters: 0,
    elevationGainMeters: 0,
    polyline: "",
    startLatitude: null,
    startLongitude: null,
  };

  const boot = document.getElementById("boot");
  const content = document.getElementById("content");
  const errEl = document.getElementById("form-error");

  function fail(msg) {
    boot.innerHTML = `<div class="bt-empty">${escapeHtml(msg)} <br><br><a class="bt-btn bt-btn-ghost" href="/admin/my-rides.html">Back to My Rides</a></div>`;
  }

  // Manual entry has no source doc; ride/edit fetch theirs.
  let data = {};
  let coords = [];
  if (!isManual) {
    let snap;
    try {
      snap = await getDoc(
        isEdit ? doc(db, "verifiedTrails", trailId) : doc(db, "rides", rideId)
      );
    } catch (e) {
      fail("Failed to load: " + (e.message || e));
      throw e;
    }
    if (!snap.exists()) {
      fail(isEdit ? "Trail not found." : "Ride not found.");
      throw new Error("not found");
    }
    data = snap.data();

    // ---- Prefill from ride / existing trail ----
    // The `rides` collection uses distance/elevationGain (meters) and
    // `encodedPolyline`; `verifiedTrails` uses the contract keys
    // distanceMeters/elevationGainMeters/polyline. Map per source so the
    // values written to the trail always use the contract keys.
    if (isEdit) {
      src.distanceMeters = Number(data.distanceMeters) || 0;
      src.elevationGainMeters = Number(data.elevationGainMeters) || 0;
      src.polyline = data.polyline || "";
    } else {
      src.distanceMeters = Number(data.distance) || 0;
      src.elevationGainMeters = Number(data.elevationGain) || 0;
      src.polyline = data.encodedPolyline || data.polyline || "";
    }
    coords = decodePolyline(src.polyline);
    if (coords.length) {
      src.startLatitude = coords[0][0];
      src.startLongitude = coords[0][1];
    } else {
      src.startLatitude =
        data.startLatitude != null ? Number(data.startLatitude) : null;
      src.startLongitude =
        data.startLongitude != null ? Number(data.startLongitude) : null;
    }
  }

  // Distance + start coords are always derived (from the ride, the existing
  // trail, or the manually drawn route) and shown read-only. Elevation is
  // derived for ride/edit but admin-entered for manual.
  function syncDerivedFields() {
    document.getElementById("distance").value = metersToMiles(
      src.distanceMeters
    ).toFixed(2);
    if (!isManual) {
      document.getElementById("elevation").value = String(
        Math.round(metersToFeet(src.elevationGainMeters))
      );
    }
    document.getElementById("startLat").value = Number.isFinite(
      src.startLatitude
    )
      ? src.startLatitude.toFixed(6)
      : "—";
    document.getElementById("startLng").value = Number.isFinite(
      src.startLongitude
    )
      ? src.startLongitude.toFixed(6)
      : "—";
  }
  syncDerivedFields();
  ensureRideTypeOption(data.rideType || "trail");

  // Existing photos kept across an edit (removable). `path` is the Storage
  // object path persisted in the doc; `display` is a transient download URL
  // resolved only so the <img> can render. New uploads are staged
  // separately and compressed on selection.
  const existingPhotos = []; // { path, display }
  const newPhotos = []; // { blob, objectURL, name }

  if (isEdit) {
    document.getElementById("page-title").textContent = "Edit Verified Trail";
    document.getElementById("page-sub").textContent =
      "Update this verified trail's details.";
    document.getElementById("submit-btn").textContent = "Save Changes";
    document.getElementById("name").value = data.name || "";
    document.getElementById("region").value = data.region || "";
    document.getElementById("description").value = data.description || "";
    if (data.difficulty) document.getElementById("difficulty").value = data.difficulty;
    // isActive defaults true; only an explicit `false` unchecks it.
    document.getElementById("isActive").checked = data.isActive !== false;
    const storedPaths = data.photoURLs || data.photos || [];
    for (const path of storedPaths) {
      let display = "";
      try {
        display = await resolvePhotoDisplayURL(path);
      } catch (e) {
        console.warn("[publish] could not resolve photo", path, e.message || e);
      }
      existingPhotos.push({ path, display });
    }
  } else if (isManual) {
    document.getElementById("page-title").textContent = "New Manual Trail";
    document.getElementById("page-sub").textContent =
      "Click the map to trace the route, then fill in the details.";
    // Elevation gain has no source for a manual trail — admin enters feet.
    const elev = document.getElementById("elevation");
    elev.readOnly = false;
    elev.type = "number";
    elev.min = "0";
    elev.step = "1";
    elev.value = "0";
    elev.placeholder = "0";
    document.getElementById("route-req").hidden = false;
  }

  if (isRide) {
    // Sensible defaults from the ride; admin can override before publishing.
    document.getElementById("name").value = (data.trailName || "").trim();
    if (data.description) {
      document.getElementById("description").value = data.description;
    }
  }

  document.querySelector(".bt-form-actions a").href = isRide
    ? "/admin/my-rides.html"
    : "/admin/trails.html";

  boot.remove();
  content.hidden = false;

  // ---- Leaflet: static preview for ride/edit, draw tool for manual ----
  const mapHint = document.getElementById("map-hint");
  const mapEl = document.getElementById("map");

  let map = null;
  if (window.L) {
    map = L.map("map", { attributionControl: true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);
  }

  if (isManual) {
    document.getElementById("route-tools").hidden = false;
    if (!map) {
      mapEl.style.display = "none";
      mapHint.textContent =
        "Map unavailable — paste an encoded polyline below to set the route.";
    } else {
      map.setView([39.5, -98.35], 4); // continental US overview
      mapHint.textContent =
        "Click the map to add route points. Distance and start are computed automatically.";
    }

    let routePts = [];
    let layer = null;

    function redraw() {
      if (!map) return;
      if (layer) {
        layer.remove();
        layer = null;
      }
      if (!routePts.length) return;
      layer = L.layerGroup().addTo(map);
      L.polyline(routePts, { color: "#FF6B00", weight: 4 }).addTo(layer);
      routePts.forEach((p, i) =>
        L.circleMarker(p, {
          radius: i === 0 ? 6 : 4,
          color: "#FF6B00",
          fillColor: i === 0 ? "#FF6B00" : "#0A0A0A",
          fillOpacity: 1,
          weight: 2,
        }).addTo(layer)
      );
      if (routePts.length >= 2) {
        map.fitBounds(L.polyline(routePts).getBounds(), { padding: [24, 24] });
      }
    }

    function recompute() {
      // Standard precision-5 encode so it round-trips with iOS exactly.
      src.polyline = routePts.length >= 2 ? encodePolyline(routePts) : "";
      src.distanceMeters = routeDistanceMeters(routePts);
      if (routePts.length) {
        src.startLatitude = routePts[0][0];
        src.startLongitude = routePts[0][1];
      } else {
        src.startLatitude = null;
        src.startLongitude = null;
      }
      syncDerivedFields();
    }

    if (map) {
      map.on("click", (e) => {
        routePts.push([e.latlng.lat, e.latlng.lng]);
        redraw();
        recompute();
      });
    }
    document.getElementById("route-undo").addEventListener("click", () => {
      routePts.pop();
      redraw();
      recompute();
    });
    document.getElementById("route-clear").addEventListener("click", () => {
      routePts = [];
      redraw();
      recompute();
    });
    document.getElementById("route-load").addEventListener("click", () => {
      const pts = decodePolyline(
        document.getElementById("route-paste").value.trim()
      );
      if (pts.length < 2) {
        errEl.textContent =
          "Couldn't decode that polyline — expecting a standard precision-5 string with 2+ points.";
        return;
      }
      errEl.textContent = "";
      routePts = pts;
      redraw();
      recompute();
    });

    recompute();
  } else if (coords.length && map) {
    const line = L.polyline(coords, { color: "#FF6B00", weight: 4 }).addTo(map);
    map.fitBounds(line.getBounds(), { padding: [20, 20] });
  } else {
    mapEl.style.display = "none";
    mapHint.textContent = window.L
      ? "No route data available for this ride."
      : "Map library failed to load.";
  }

  // ---- Photo grid ----
  const grid = document.getElementById("photo-grid");
  const fileInput = document.getElementById("photos");

  function renderPhotos() {
    const items = [
      ...existingPhotos.map((p, i) => ({ src: p.display, kind: "existing", i })),
      ...newPhotos.map((p, i) => ({ src: p.objectURL, kind: "new", i })),
    ];
    grid.innerHTML = items
      .map(
        (it) => `
        <div class="bt-photo">
          <img src="${escapeHtml(it.src)}" alt="">
          <button type="button" class="bt-photo-remove" data-kind="${it.kind}" data-i="${it.i}" aria-label="Remove photo">&times;</button>
        </div>`
      )
      .join("");
  }

  grid.addEventListener("click", (e) => {
    const btn = e.target.closest(".bt-photo-remove");
    if (!btn) return;
    const i = Number(btn.dataset.i);
    if (btn.dataset.kind === "existing") existingPhotos.splice(i, 1);
    else {
      URL.revokeObjectURL(newPhotos[i].objectURL);
      newPhotos.splice(i, 1);
    }
    renderPhotos();
  });

  fileInput.addEventListener("change", async () => {
    errEl.textContent = "";
    const files = [...fileInput.files];
    fileInput.value = "";
    for (const file of files) {
      if (existingPhotos.length + newPhotos.length >= MAX_PHOTOS) {
        errEl.textContent = `Maximum ${MAX_PHOTOS} photos.`;
        break;
      }
      try {
        const blob = await compressImage(file);
        if (blob.size > MAX_PHOTO_BYTES) {
          errEl.textContent = `"${file.name}" is still over 5MB after compression and was skipped.`;
          continue;
        }
        newPhotos.push({
          blob,
          objectURL: URL.createObjectURL(blob),
          name: file.name,
        });
        renderPhotos();
      } catch (err) {
        console.error(err);
        errEl.textContent = `Couldn't process "${file.name}".`;
      }
    }
  });

  if (isEdit) renderPhotos();

  // ---- Submit ----
  const form = document.getElementById("trail-form");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";

    const name = document.getElementById("name").value.trim();
    const region = document.getElementById("region").value.trim();
    if (!name || !region) {
      errEl.textContent = "Name and Region are required.";
      return;
    }
    if (isManual) {
      // Admin-entered elevation (feet -> meters); a number is required by
      // the contract, 0 is acceptable.
      src.elevationGainMeters = Math.max(
        0,
        feetToMeters(parseFloat(document.getElementById("elevation").value) || 0)
      );
      if (!src.polyline || !(src.distanceMeters > 0)) {
        errEl.textContent =
          "Draw a route with at least two points (or paste an encoded polyline).";
        return;
      }
    }
    // iOS Swift-casts startLatitude/startLongitude as non-optional numbers.
    // Refuse to write null/garbage — that would fail to decode in the app.
    if (
      !Number.isFinite(src.startLatitude) ||
      !Number.isFinite(src.startLongitude)
    ) {
      errEl.textContent = isManual
        ? "Add the route first so a start point can be set."
        : "No start coordinates: this ride has no decodable route, so it can't be published as a trail.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = isEdit ? "Saving…" : "Publishing…";

    try {
      // Reserve the doc id FIRST so photos live under verified_trails/<id>/
      // and the doc can be written with their paths in one go.
      let trailRef;
      let targetId;
      if (isEdit) {
        trailRef = doc(db, "verifiedTrails", trailId);
        targetId = trailId;
      } else {
        trailRef = doc(collection(db, "verifiedTrails"));
        targetId = trailRef.id;
      }

      // Final photoURLs = kept existing Storage paths + newly uploaded paths.
      // Stored as Storage OBJECT PATHS (not download URLs) per the iOS
      // contract. New file names are single path segments and timestamped
      // so re-uploads never clobber a kept photo.
      const photoURLs = existingPhotos.map((p) => p.path);
      const stamp = Date.now();
      for (let i = 0; i < newPhotos.length; i++) {
        const fileName = `photo-${stamp}-${i + 1}.jpg`;
        const path = await uploadTrailPhoto(targetId, fileName, newPhotos[i].blob);
        photoURLs.push(path);
      }

      // Only the fields iOS reads, with the exact keys/types from the
      // contract. Editable on both create and edit:
      const editable = {
        name,
        region,
        description: document.getElementById("description").value.trim(),
        difficulty: document.getElementById("difficulty").value,
        rideType: rideTypeSel.value,
        distanceMeters: src.distanceMeters,
        elevationGainMeters: src.elevationGainMeters,
        polyline: src.polyline,
        startLatitude: src.startLatitude,
        startLongitude: src.startLongitude,
        photoURLs,
        isActive: document.getElementById("isActive").checked,
      };

      if (isEdit) {
        // Preserve source/sourceRideId/sourceUserId/verifiedBy/verifiedAt
        // already on the doc — an edit changes content, not provenance.
        await updateDoc(trailRef, editable);
      } else if (isRide) {
        await setDoc(trailRef, {
          ...editable,
          source: "user_ride",
          sourceRideId: rideId,
          sourceUserId: user.uid,
          verifiedBy: user.uid,
          verifiedAt: serverTimestamp(),
        });
      } else {
        // Manual entry: no source ride/user; importedFrom/originalFileName
        // are reserved and intentionally left unset.
        await setDoc(trailRef, {
          ...editable,
          source: "manual",
          verifiedBy: user.uid,
          verifiedAt: serverTimestamp(),
        });
      }

      queueToast(
        isEdit ? "Trail updated." : "Trail published.",
        "success"
      );
      location.assign("/admin/trails.html");
    } catch (err) {
      console.error(err);
      errEl.textContent =
        "Save failed: " + (err && err.message ? err.message : err);
      submitBtn.disabled = false;
      submitBtn.textContent = isEdit ? "Save Changes" : "Publish Trail";
    }
  });
</script>

</body>
</html>
