<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Publish Trail — BraapTrax Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="bt-wrap" id="content" hidden>
  <div class="bt-header">
    <div class="bt-eyebrow">Admin</div>
    <h1 class="bt-title" id="page-title">Publish Verified Trail</h1>
    <p class="bt-sub" id="page-sub">Review the ride data, fill in the trail details, and publish.</p>
  </div>

  <form class="bt-form" id="trail-form" novalidate>
    <div class="bt-field">
      <span class="bt-label">Route<span id="route-req" hidden> <span class="req">*</span></span></span>
      <div class="bt-map" id="map"></div>
      <span class="bt-hint" id="map-hint"></span>
      <div id="route-tools" hidden>
        <div class="bt-row-actions" style="margin-top:.6rem">
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-undo">Undo</button>
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-reset" hidden>Reset to original</button>
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-clear">Clear route</button>
        </div>
        <details id="trim-box" style="margin-top:.75rem">
          <summary class="bt-hint" style="cursor:pointer">Trim start / end (cut campsite approach, etc.)</summary>
          <div class="bt-trim">
            <label class="bt-label" for="trim-start">Start (green): point <span id="trim-start-val">1</span></label>
            <div class="bt-trim-row">
              <button type="button" class="bt-nudge" id="trim-start-dec" aria-label="Start back one point">&minus;</button>
              <input type="range" id="trim-start" min="0" value="0" step="1">
              <button type="button" class="bt-nudge" id="trim-start-inc" aria-label="Start forward one point">+</button>
            </div>
            <label class="bt-label" for="trim-end">End (red): point <span id="trim-end-val">1</span></label>
            <div class="bt-trim-row">
              <button type="button" class="bt-nudge" id="trim-end-dec" aria-label="End back one point">&minus;</button>
              <input type="range" id="trim-end" min="0" value="0" step="1">
              <button type="button" class="bt-nudge" id="trim-end-inc" aria-label="End forward one point">+</button>
            </div>
            <p class="bt-hint" id="trim-readout"></p>
            <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="trim-apply">Apply trim</button>
          </div>
        </details>
        <details style="margin-top:.75rem">
          <summary class="bt-hint" style="cursor:pointer">…or paste an encoded polyline (standard, precision&nbsp;5)</summary>
          <textarea class="bt-textarea" id="route-paste" style="min-height:64px;margin-top:.5rem"></textarea>
          <button type="button" class="bt-btn bt-btn-ghost bt-btn-sm" id="route-load" style="margin-top:.5rem">Load polyline</button>
        </details>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="name">Name <span class="req">*</span></label>
        <input class="bt-input" type="text" id="name" maxlength="120" required>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="region">Region <span class="req">*</span></label>
        <input class="bt-input" type="text" id="region" placeholder="Moab, UT" maxlength="120" required>
      </div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="description">Description</label>
      <textarea class="bt-textarea" id="description" maxlength="2000"></textarea>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="difficulty">Difficulty</label>
        <select class="bt-select" id="difficulty">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
          <option value="expert">Expert</option>
        </select>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="rideType">Ride Type</label>
        <select class="bt-select" id="rideType"></select>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="distance">Distance (miles)</label>
        <input class="bt-input" type="text" id="distance" readonly>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="elevation">Elevation Gain (feet)</label>
        <input class="bt-input" type="text" id="elevation" readonly>
      </div>
    </div>

    <div class="bt-grid-2">
      <div class="bt-field">
        <label class="bt-label" for="startLat">Start Latitude</label>
        <input class="bt-input" type="text" id="startLat" readonly>
      </div>
      <div class="bt-field">
        <label class="bt-label" for="startLng">Start Longitude</label>
        <input class="bt-input" type="text" id="startLng" readonly>
      </div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="photos">Photos <span class="bt-hint">(max 10 · resized to 1920px · JPEG)</span></label>
      <input type="file" id="photos" accept="image/*" multiple>
      <div class="bt-photos" id="photo-grid"></div>
    </div>

    <div class="bt-field">
      <label class="bt-label" for="isActive" style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;text-transform:none;letter-spacing:0;">
        <input type="checkbox" id="isActive" checked style="width:auto;accent-color:var(--orange);">
        <span>Active &mdash; visible in the BraapTrax app</span>
      </label>
      <span class="bt-hint">The app only shows trails where this is on. New trails default to active.</span>
    </div>

    <div class="bt-error" id="form-error"></div>
    <div class="bt-form-actions">
      <button class="bt-btn bt-btn-primary" type="submit" id="submit-btn">Publish Trail</button>
      <a class="bt-btn bt-btn-ghost" href="/admin/my-rides.html">Cancel</a>
    </div>
  </form>
</div>

<div class="bt-wrap" id="boot">
  <div class="bt-loading"><span class="bt-spinner"></span></div>
</div>

<script type="module">
  import {
    guardPage,
    db,
    doc, collection, getDoc, setDoc, updateDoc, serverTimestamp,
    uploadTrailPhoto, resolvePhotoDisplayURL,
    decodePolyline, encodePolyline, routeDistanceMeters,
    metersToMiles, metersToFeet, feetToMeters,
    compressImage, MAX_PHOTO_BYTES, MAX_PHOTOS,
    RIDE_TYPES, queueToast, escapeHtml,
    buildTrailIndex, TRAIL_INDEX_COLLECTION,
  } from "/admin/admin.js";

  const params = new URLSearchParams(location.search);
  const rideId = params.get("rideId");
  const trailId = params.get("trailId");
  const isEdit = !!trailId;
  const isRide = !isEdit && !!rideId;
  // No ride and no trail -> manual (no-ride) entry: admin draws the route.
  const isManual = !isEdit && !isRide;

  // Highlight "Draw" in the nav for manual entry (this page is the editor
  // that /admin/manual.html redirects to).
  const { user } = await guardPage(isManual ? "draw" : "publish");

  // Populate the ride-type dropdown.
  const rideTypeSel = document.getElementById("rideType");
  rideTypeSel.innerHTML = RIDE_TYPES.map(
    (t) => `<option value="${t}">${t}</option>`
  ).join("");

  function ensureRideTypeOption(val) {
    if (!val) return;
    if (![...rideTypeSel.options].some((o) => o.value === val)) {
      rideTypeSel.insertAdjacentHTML(
        "afterbegin",
        `<option value="${escapeHtml(val)}">${escapeHtml(val)}</option>`
      );
    }
    rideTypeSel.value = val;
  }

  // Source data carried through from the ride / existing trail.
  const src = {
    distanceMeters: 0,
    elevationGainMeters: 0,
    polyline: "",
    startLatitude: null,
    startLongitude: null,
  };

  const boot = document.getElementById("boot");
  const content = document.getElementById("content");
  const errEl = document.getElementById("form-error");

  function fail(msg) {
    boot.innerHTML = `<div class="bt-empty">${escapeHtml(msg)} <br><br><a class="bt-btn bt-btn-ghost" href="/admin/my-rides.html">Back to My Rides</a></div>`;
  }

  // Manual entry has no source doc; ride/edit fetch theirs.
  let data = {};
  let coords = [];
  if (!isManual) {
    let snap;
    try {
      snap = await getDoc(
        isEdit ? doc(db, "verifiedTrails", trailId) : doc(db, "rides", rideId)
      );
    } catch (e) {
      fail("Failed to load: " + (e.message || e));
      throw e;
    }
    if (!snap.exists()) {
      fail(isEdit ? "Trail not found." : "Ride not found.");
      throw new Error("not found");
    }
    data = snap.data();

    // ---- Prefill from ride / existing trail ----
    // The `rides` collection uses distance/elevationGain (meters) and
    // `encodedPolyline`; `verifiedTrails` uses the contract keys
    // distanceMeters/elevationGainMeters/polyline. Map per source so the
    // values written to the trail always use the contract keys.
    if (isEdit) {
      src.distanceMeters = Number(data.distanceMeters) || 0;
      src.elevationGainMeters = Number(data.elevationGainMeters) || 0;
      src.polyline = data.polyline || "";
    } else {
      src.distanceMeters = Number(data.distance) || 0;
      src.elevationGainMeters = Number(data.elevationGain) || 0;
      src.polyline = data.encodedPolyline || data.polyline || "";
    }
    coords = decodePolyline(src.polyline);
    if (coords.length) {
      src.startLatitude = coords[0][0];
      src.startLongitude = coords[0][1];
    } else {
      src.startLatitude =
        data.startLatitude != null ? Number(data.startLatitude) : null;
      src.startLongitude =
        data.startLongitude != null ? Number(data.startLongitude) : null;
    }
  }

  // Distance + start coords are always derived (from the ride, the existing
  // trail, or the manually drawn route) and shown read-only. Elevation is
  // derived for ride/edit but admin-entered for manual.
  function syncDerivedFields() {
    document.getElementById("distance").value = metersToMiles(
      src.distanceMeters
    ).toFixed(2);
    if (!isManual) {
      document.getElementById("elevation").value = String(
        Math.round(metersToFeet(src.elevationGainMeters))
      );
    }
    document.getElementById("startLat").value = Number.isFinite(
      src.startLatitude
    )
      ? src.startLatitude.toFixed(6)
      : "—";
    document.getElementById("startLng").value = Number.isFinite(
      src.startLongitude
    )
      ? src.startLongitude.toFixed(6)
      : "—";
  }
  syncDerivedFields();
  ensureRideTypeOption(data.rideType || "trail");

  // Existing photos kept across an edit (removable). `path` is the Storage
  // object path persisted in the doc; `display` is a transient download URL
  // resolved only so the <img> can render. New uploads are staged
  // separately and compressed on selection.
  const existingPhotos = []; // { path, display }
  const newPhotos = []; // { blob, objectURL, name }

  if (isEdit) {
    document.getElementById("page-title").textContent = "Edit Verified Trail";
    document.getElementById("page-sub").textContent =
      "Update this verified trail's details.";
    document.getElementById("submit-btn").textContent = "Save Changes";
    document.getElementById("name").value = data.name || "";
    document.getElementById("region").value = data.region || "";
    document.getElementById("description").value = data.description || "";
    if (data.difficulty) document.getElementById("difficulty").value = data.difficulty;
    // isActive defaults true; only an explicit `false` unchecks it.
    document.getElementById("isActive").checked = data.isActive !== false;
    const storedPaths = data.photoURLs || data.photos || [];
    for (const path of storedPaths) {
      let display = "";
      try {
        display = await resolvePhotoDisplayURL(path);
      } catch (e) {
        console.warn("[publish] could not resolve photo", path, e.message || e);
      }
      existingPhotos.push({ path, display });
    }
  } else if (isManual) {
    document.getElementById("page-title").textContent = "New Manual Trail";
    document.getElementById("page-sub").textContent =
      "Click the map to trace the route, then fill in the details.";
    // Elevation gain has no source for a manual trail — admin enters feet.
    const elev = document.getElementById("elevation");
    elev.readOnly = false;
    elev.type = "number";
    elev.min = "0";
    elev.step = "1";
    elev.value = "0";
    elev.placeholder = "0";
    document.getElementById("route-req").hidden = false;
  }

  if (isRide) {
    // Sensible defaults from the ride; admin can override before publishing.
    document.getElementById("name").value = (data.trailName || "").trim();
    if (data.description) {
      document.getElementById("description").value = data.description;
    }
  }

  document.querySelector(".bt-form-actions a").href = isRide
    ? "/admin/my-rides.html"
    : "/admin/trails.html";

  boot.remove();
  content.hidden = false;

  // ---- Leaflet: editable route in every mode ----
  // Drag a point to move it, click a point to delete it, click the line to
  // insert a point, click empty map to append. Undo / Reset / Clear too.
  const mapHint = document.getElementById("map-hint");
  const mapEl = document.getElementById("map");

  let map = null;
  if (window.L) {
    map = L.map("map", { attributionControl: true });
    // Free, key-less satellite imagery (default) with a Streets toggle.
    const sat = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: 19,
        attribution:
          "Tiles &copy; Esri — Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community",
      }
    );
    const streets = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 19,
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }
    );
    sat.addTo(map);
    L.control.layers({ Satellite: sat, Streets: streets }).addTo(map);

    // Fullscreen toggle for precise route editing.
    let fsLink;
    function toggleFull() {
      const full = mapEl.classList.toggle("bt-map--full");
      document.body.classList.toggle("bt-noscroll", full);
      if (fsLink) {
        fsLink.innerHTML = full ? "&#10005;" : "&#9974;";
        fsLink.title = full ? "Exit full screen (Esc)" : "Full screen";
      }
      setTimeout(() => map.invalidateSize(), 60);
    }
    const FsControl = L.Control.extend({
      options: { position: "topright" },
      onAdd() {
        const wrap = L.DomUtil.create("div", "leaflet-bar bt-fs");
        fsLink = L.DomUtil.create("a", "", wrap);
        fsLink.href = "#";
        fsLink.role = "button";
        fsLink.innerHTML = "&#9974;";
        fsLink.title = "Full screen";
        L.DomEvent.disableClickPropagation(wrap);
        L.DomEvent.on(fsLink, "click", (e) => {
          L.DomEvent.stop(e);
          toggleFull();
        });
        return wrap;
      },
    });
    map.addControl(new FsControl());
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && mapEl.classList.contains("bt-map--full")) {
        toggleFull();
      }
    });
  }

  // Route state. Seeded from the decoded source route (ride/edit) or empty
  // (manual). Editing makes it "dirty" so the polyline + distance get
  // recomputed; while pristine, ride/edit keep the exact source values.
  let routePts = coords.map((c) => [c[0], c[1]]);
  const originalPts = routePts.map((p) => [p[0], p[1]]);
  const srcPolyline0 = src.polyline;
  const srcDistance0 = src.distanceMeters;
  let dirty = false;
  const history = [];

  function snapshot() {
    history.push(routePts.map((p) => [p[0], p[1]]));
    if (history.length > 100) history.shift();
  }

  let routeLine = null;
  let vertexMarkers = [];
  let suppressMapClick = false;

  function vIcon(isStart) {
    return L.divIcon({
      className: "",
      html: `<span class="bt-vtx${isStart ? " bt-vtx--start" : ""}"></span>`,
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
  }

  function redrawAll() {
    if (!map) return;
    if (routeLine) {
      routeLine.remove();
      routeLine = null;
    }
    vertexMarkers.forEach((m) => m.remove());
    vertexMarkers = [];
    if (!routePts.length) return;

    routeLine = L.polyline(routePts, { color: "#FF6B00", weight: 4 }).addTo(map);
    routeLine.on("click", (e) => {
      // Insert a vertex into the nearest segment at the click point.
      L.DomEvent.stop(e);
      suppressMapClick = true;
      setTimeout(() => (suppressMapClick = false), 0);
      const pt = [e.latlng.lat, e.latlng.lng];
      let bestI = 1;
      let bestD = Infinity;
      for (let i = 1; i < routePts.length; i++) {
        const mid = [
          (routePts[i - 1][0] + routePts[i][0]) / 2,
          (routePts[i - 1][1] + routePts[i][1]) / 2,
        ];
        const d = (mid[0] - pt[0]) ** 2 + (mid[1] - pt[1]) ** 2;
        if (d < bestD) {
          bestD = d;
          bestI = i;
        }
      }
      snapshot();
      routePts.splice(bestI, 0, pt);
      dirty = true;
      redrawAll();
      recompute();
    });

    routePts.forEach((p, i) => {
      const mk = L.marker(p, {
        draggable: true,
        icon: vIcon(i === 0),
        title:
          i === 0 ? "Start — drag to move, click to delete" : "Drag to move, click to delete",
      }).addTo(map);
      mk.on("dragstart", snapshot);
      mk.on("drag", (e) => {
        const ll = e.target.getLatLng();
        routePts[i] = [ll.lat, ll.lng];
        if (routeLine) routeLine.setLatLngs(routePts);
      });
      mk.on("dragend", () => {
        dirty = true;
        recompute();
      });
      mk.on("click", (e) => {
        L.DomEvent.stop(e);
        snapshot();
        routePts.splice(i, 1);
        dirty = true;
        redrawAll();
        recompute();
      });
      vertexMarkers.push(mk);
    });
  }

  function fitView() {
    if (!map || !routePts.length) return;
    if (routePts.length === 1) {
      map.setView(routePts[0], 14);
    } else {
      map.fitBounds(L.polyline(routePts).getBounds(), { padding: [24, 24] });
    }
  }

  function recompute() {
    if (isManual || dirty) {
      // Standard precision-5 encode → round-trips with iOS exactly.
      src.polyline = routePts.length >= 2 ? encodePolyline(routePts) : "";
      src.distanceMeters = routeDistanceMeters(routePts);
    } else {
      // Untouched ride/edit route: keep the exact recorded values.
      src.polyline = srcPolyline0;
      src.distanceMeters = srcDistance0;
    }
    if (routePts.length) {
      src.startLatitude = routePts[0][0];
      src.startLongitude = routePts[0][1];
    } else {
      src.startLatitude = null;
      src.startLongitude = null;
    }
    syncDerivedFields();
    if (!isManual) {
      mapHint.textContent = dirty
        ? "Route edited — distance recalculated from the edited line."
        : "Drag a point to move it · click a point to delete · click the line to insert · click the map to extend.";
    }
  }

  document.getElementById("route-tools").hidden = false;
  const resetBtn = document.getElementById("route-reset");
  if (originalPts.length) resetBtn.hidden = false;

  if (!map) {
    mapEl.style.display = "none";
    mapHint.textContent = window.L
      ? "Map unavailable — paste an encoded polyline below to set the route."
      : "Map library failed to load — paste an encoded polyline below.";
  } else {
    if (routePts.length) {
      redrawAll();
      fitView();
    } else {
      map.setView([39.5, -98.35], 4); // continental US overview
    }
    map.on("click", (e) => {
      if (suppressMapClick) return;
      snapshot();
      routePts.push([e.latlng.lat, e.latlng.lng]);
      dirty = true;
      redrawAll();
      recompute();
    });
    mapHint.textContent = isManual
      ? "Click the map to add route points. Distance and start are computed automatically."
      : "Drag a point to move it · click a point to delete · click the line to insert · click the map to extend.";
  }

  document.getElementById("route-undo").addEventListener("click", () => {
    if (!history.length) return;
    routePts = history.pop();
    dirty = true;
    redrawAll();
    recompute();
  });
  resetBtn.addEventListener("click", () => {
    snapshot();
    routePts = originalPts.map((p) => [p[0], p[1]]);
    dirty = false;
    redrawAll();
    fitView();
    recompute();
  });
  document.getElementById("route-clear").addEventListener("click", () => {
    snapshot();
    routePts = [];
    dirty = true;
    redrawAll();
    recompute();
  });
  document.getElementById("route-load").addEventListener("click", () => {
    const pts = decodePolyline(
      document.getElementById("route-paste").value.trim()
    );
    if (pts.length < 2) {
      errEl.textContent =
        "Couldn't decode that polyline — expecting a standard precision-5 string with 2+ points.";
      return;
    }
    errEl.textContent = "";
    snapshot();
    routePts = pts;
    dirty = true;
    redrawAll();
    fitView();
    recompute();
  });

  // ---- Trim start / end ----
  // Slice off a leading/trailing chunk (e.g. the ride from a campsite to
  // the real trailhead). Live preview: dashed grey = will be cut.
  const trimBox = document.getElementById("trim-box");
  const trimStart = document.getElementById("trim-start");
  const trimEnd = document.getElementById("trim-end");
  const trimStartVal = document.getElementById("trim-start-val");
  const trimEndVal = document.getElementById("trim-end-val");
  const trimReadout = document.getElementById("trim-readout");
  const trimApply = document.getElementById("trim-apply");
  let trimLayer = null;

  function trimPaneReady() {
    if (!map) return;
    if (!map.getPane("trimPane")) {
      const p = map.createPane("trimPane");
      p.style.zIndex = 680; // above route line + vertex handles
    }
  }

  function setVerticesVisible(v) {
    vertexMarkers.forEach((m) => m.setOpacity(v ? 1 : 0));
  }

  function clearTrimPreview() {
    if (trimLayer) {
      trimLayer.remove();
      trimLayer = null;
    }
    setVerticesVisible(true);
  }

  function drawTrimPreview(s, e) {
    if (!map) return;
    trimPaneReady();
    if (trimLayer) trimLayer.remove();
    trimLayer = L.layerGroup().addTo(map);
    // Hide the dense orange vertex handles so they can't bury the trim
    // markers; the route still shows as the orange line underneath.
    setVerticesVisible(false);

    const cut = {
      pane: "trimPane",
      color: "#9aa0a6",
      weight: 3,
      dashArray: "3 8",
      opacity: 0.95,
    };
    if (s > 0) L.polyline(routePts.slice(0, s + 1), cut).addTo(trimLayer);
    if (e < routePts.length - 1) {
      L.polyline(routePts.slice(e), cut).addTo(trimLayer);
    }
    // Bright "kept" highlight over the portion that survives.
    L.polyline(routePts.slice(s, e + 1), {
      pane: "trimPane",
      color: "#FFFFFF",
      weight: 5,
      opacity: 0.9,
    }).addTo(trimLayer);

    const handle = (pt, fill, label) => {
      L.circleMarker(pt, {
        pane: "trimPane",
        radius: 10,
        color: "#FFFFFF",
        weight: 3,
        fillColor: fill,
        fillOpacity: 1,
      })
        .addTo(trimLayer)
        .bindTooltip(label, {
          permanent: true,
          direction: "top",
          className: "bt-trim-tip",
          pane: "trimPane",
        });
    };
    handle(routePts[s], "#46B17B", "START");
    handle(routePts[e], "#E5484D", "END");
  }

  // source: "start" | "end" | null. Clamps so start < end, updates the
  // readout/preview, and pans the map to the handle being adjusted so it
  // stays in view for fine-tuning.
  function updateTrim(source) {
    const n = routePts.length;
    let s = parseInt(trimStart.value, 10) || 0;
    let e = parseInt(trimEnd.value, 10) || 0;
    if (s >= e) {
      if (source === "end") s = Math.max(0, e - 1);
      else e = Math.min(n - 1, s + 1);
    }
    trimStart.value = s;
    trimEnd.value = e;
    trimStartVal.textContent = s + 1;
    trimEndVal.textContent = e + 1;
    const keptMi = metersToMiles(
      routeDistanceMeters(routePts.slice(s, e + 1))
    ).toFixed(2);
    trimReadout.textContent =
      `Keep points ${s + 1}–${e + 1} of ${n} · ${keptMi} mi ` +
      `(cuts ${s} from start, ${n - 1 - e} from end)`;
    drawTrimPreview(s, e);
    if (map && source) {
      map.panTo(routePts[source === "end" ? e : s], { animate: true, duration: 0.2 });
    }
  }

  function initTrim() {
    const n = routePts.length;
    if (n < 3) {
      trimStart.max = trimEnd.max = Math.max(0, n - 1);
      trimApply.disabled = true;
      trimReadout.textContent = "Need at least 3 points to trim.";
      clearTrimPreview();
      return;
    }
    trimApply.disabled = false;
    trimStart.max = trimEnd.max = n - 1;
    trimStart.value = 0;
    trimEnd.value = n - 1;
    if (map) fitView();
    updateTrim(null);
  }

  function nudge(input, delta, source) {
    const max = parseInt(input.max, 10) || 0;
    input.value = Math.min(max, Math.max(0, (parseInt(input.value, 10) || 0) + delta));
    updateTrim(source);
  }

  trimStart.addEventListener("input", () => updateTrim("start"));
  trimEnd.addEventListener("input", () => updateTrim("end"));
  document.getElementById("trim-start-dec").addEventListener("click", () => nudge(trimStart, -1, "start"));
  document.getElementById("trim-start-inc").addEventListener("click", () => nudge(trimStart, 1, "start"));
  document.getElementById("trim-end-dec").addEventListener("click", () => nudge(trimEnd, -1, "end"));
  document.getElementById("trim-end-inc").addEventListener("click", () => nudge(trimEnd, 1, "end"));
  trimBox.addEventListener("toggle", () => {
    if (trimBox.open) initTrim();
    else clearTrimPreview();
  });
  trimApply.addEventListener("click", () => {
    const n = routePts.length;
    const s = parseInt(trimStart.value, 10) || 0;
    const e = parseInt(trimEnd.value, 10) || 0;
    if (n < 3 || s >= e || (s === 0 && e === n - 1)) {
      clearTrimPreview();
      trimBox.open = false;
      return;
    }
    snapshot();
    routePts = routePts.slice(s, e + 1);
    dirty = true;
    clearTrimPreview();
    trimBox.open = false;
    redrawAll();
    fitView();
    recompute();
  });

  recompute();

  // ---- Photo grid ----
  const grid = document.getElementById("photo-grid");
  const fileInput = document.getElementById("photos");

  function renderPhotos() {
    const items = [
      ...existingPhotos.map((p, i) => ({ src: p.display, kind: "existing", i })),
      ...newPhotos.map((p, i) => ({ src: p.objectURL, kind: "new", i })),
    ];
    grid.innerHTML = items
      .map(
        (it) => `
        <div class="bt-photo">
          <img src="${escapeHtml(it.src)}" alt="">
          <button type="button" class="bt-photo-remove" data-kind="${it.kind}" data-i="${it.i}" aria-label="Remove photo">&times;</button>
        </div>`
      )
      .join("");
  }

  grid.addEventListener("click", (e) => {
    const btn = e.target.closest(".bt-photo-remove");
    if (!btn) return;
    const i = Number(btn.dataset.i);
    if (btn.dataset.kind === "existing") existingPhotos.splice(i, 1);
    else {
      URL.revokeObjectURL(newPhotos[i].objectURL);
      newPhotos.splice(i, 1);
    }
    renderPhotos();
  });

  fileInput.addEventListener("change", async () => {
    errEl.textContent = "";
    const files = [...fileInput.files];
    fileInput.value = "";
    for (const file of files) {
      if (existingPhotos.length + newPhotos.length >= MAX_PHOTOS) {
        errEl.textContent = `Maximum ${MAX_PHOTOS} photos.`;
        break;
      }
      try {
        const blob = await compressImage(file);
        if (blob.size > MAX_PHOTO_BYTES) {
          errEl.textContent = `"${file.name}" is still over 5MB after compression and was skipped.`;
          continue;
        }
        newPhotos.push({
          blob,
          objectURL: URL.createObjectURL(blob),
          name: file.name,
        });
        renderPhotos();
      } catch (err) {
        console.error(err);
        errEl.textContent = `Couldn't process "${file.name}".`;
      }
    }
  });

  if (isEdit) renderPhotos();

  // ---- Submit ----
  const form = document.getElementById("trail-form");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";

    const name = document.getElementById("name").value.trim();
    const region = document.getElementById("region").value.trim();
    if (!name || !region) {
      errEl.textContent = "Name and Region are required.";
      return;
    }
    if (isManual) {
      // Admin-entered elevation (feet -> meters); a number is required by
      // the contract, 0 is acceptable.
      src.elevationGainMeters = Math.max(
        0,
        feetToMeters(parseFloat(document.getElementById("elevation").value) || 0)
      );
    }
    // A verified trail must have a route (the route is editable in every
    // mode, so this also catches clearing/deleting all points).
    if (!src.polyline) {
      errEl.textContent =
        "A route is required — keep, draw, or paste at least two points.";
      return;
    }
    // iOS Swift-casts startLatitude/startLongitude as non-optional numbers.
    // Refuse to write null/garbage — that would fail to decode in the app.
    if (
      !Number.isFinite(src.startLatitude) ||
      !Number.isFinite(src.startLongitude)
    ) {
      errEl.textContent = "Route has no valid start point.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = isEdit ? "Saving…" : "Publishing…";

    try {
      // Reserve the doc id FIRST so photos live under verified_trails/<id>/
      // and the doc can be written with their paths in one go.
      let trailRef;
      let targetId;
      if (isEdit) {
        trailRef = doc(db, "verifiedTrails", trailId);
        targetId = trailId;
      } else {
        trailRef = doc(collection(db, "verifiedTrails"));
        targetId = trailRef.id;
      }

      // Final photoURLs = kept existing Storage paths + newly uploaded paths.
      // Stored as Storage OBJECT PATHS (not download URLs) per the iOS
      // contract. New file names are single path segments and timestamped
      // so re-uploads never clobber a kept photo.
      const photoURLs = existingPhotos.map((p) => p.path);
      const stamp = Date.now();
      for (let i = 0; i < newPhotos.length; i++) {
        const fileName = `photo-${stamp}-${i + 1}.jpg`;
        const path = await uploadTrailPhoto(targetId, fileName, newPhotos[i].blob);
        photoURLs.push(path);
      }

      // Only the fields iOS reads, with the exact keys/types from the
      // contract. Editable on both create and edit:
      const editable = {
        name,
        region,
        description: document.getElementById("description").value.trim(),
        difficulty: document.getElementById("difficulty").value,
        rideType: rideTypeSel.value,
        distanceMeters: src.distanceMeters,
        elevationGainMeters: src.elevationGainMeters,
        polyline: src.polyline,
        startLatitude: src.startLatitude,
        startLongitude: src.startLongitude,
        photoURLs,
        isActive: document.getElementById("isActive").checked,
      };

      if (isEdit) {
        // Preserve source/sourceRideId/sourceUserId/verifiedBy/verifiedAt
        // already on the doc — an edit changes content, not provenance.
        await updateDoc(trailRef, editable);
      } else if (isRide) {
        await setDoc(trailRef, {
          ...editable,
          source: "user_ride",
          sourceRideId: rideId,
          sourceUserId: user.uid,
          verifiedBy: user.uid,
          verifiedAt: serverTimestamp(),
        });
      } else {
        // Manual entry: no source ride/user; importedFrom/originalFileName
        // are reserved and intentionally left unset.
        await setDoc(trailRef, {
          ...editable,
          source: "manual",
          verifiedBy: user.uid,
          verifiedAt: serverTimestamp(),
        });
      }

      // Mirror into the lightweight search index (best-effort: if the
      // trailIndex rules aren't deployed yet this is skipped, and the
      // Trails "Rebuild index" tool backfills it later).
      try {
        const idxSource = isEdit
          ? data.source || "manual"
          : isRide
          ? "user_ride"
          : "manual";
        await setDoc(doc(db, TRAIL_INDEX_COLLECTION, targetId), {
          ...buildTrailIndex({ ...editable, source: idxSource }),
        });
      } catch (idxErr) {
        console.warn("[publish] trailIndex write skipped:", idxErr.message || idxErr);
      }

      queueToast(
        isEdit ? "Trail updated." : "Trail published.",
        "success"
      );
      location.assign("/admin/trails.html");
    } catch (err) {
      console.error(err);
      errEl.textContent =
        "Save failed: " + (err && err.message ? err.message : err);
      submitBtn.disabled = false;
      submitBtn.textContent = isEdit ? "Save Changes" : "Publish Trail";
    }
  });
</script>

</body>
</html>
